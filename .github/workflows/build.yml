name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist_script: dist:mac
            artifact_name: baton-macos
            artifact_paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
          - os: windows-latest
            dist_script: dist:win
            artifact_name: baton-windows
            artifact_paths: |
              release/*.exe
              release/*.blockmap
          - os: ubuntu-latest
            dist_script: dist:linux
            artifact_name: baton-linux
            artifact_paths: |
              release/*.AppImage
              release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            python3 \
            libx11-dev \
            libxkbfile-dev \
            libsecret-1-dev \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests and typecheck
        run: |
          bun test
          bun run typecheck

      - name: Verify Electron session persistence
        if: matrix.os != 'windows-latest'
        run: |
          bun run build
          bun run verify:session-persistence:built

      - name: Build and package (${{ matrix.dist_script }})
        run: bun run ${{ matrix.dist_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable automatic code signing discovery on macOS runners; we don't have certs in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14
